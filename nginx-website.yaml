apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-website
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Kubernetes Cluster Project</title>
      <style>
        body {
          margin: 0;
          font-family: Arial, sans-serif;
          background: linear-gradient(135deg, #0f172a, #2563eb);
          color: white;
          text-align: center;
        }
        .box {
          margin: 80px auto;
          max-width: 800px;
          padding: 40px;
          border-radius: 20px;
          background: rgba(255,255,255,0.12);
          box-shadow: 0 0 25px rgba(0,0,0,0.3);
        }
        h1 { font-size: 42px; }
        p { font-size: 20px; line-height: 1.6; }
        .grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 15px;
          margin-top: 30px;
        }
        .card {
          padding: 20px;
          border-radius: 15px;
          background: rgba(255,255,255,0.15);
        }
      </style>
    </head>
    <body>
      <div class="box">
        <h1>🚀 Kubernetes Cluster Project</h1>
        <p>Deployed successfully on a 4-VM Kubernetes cluster using kubeadm, containerd, Calico, Deployments and NodePort Services.</p>
        <div class="grid">
          <div class="card">Master Node</div>
          <div class="card">3 Worker Nodes</div>
          <div class="card">6 Nginx Pods</div>
        </div>
        <p>Application is running with scaling, load balancing and self-healing.</p>
      </div>
    </body>
    </html>
